#cloud-config
package_update: true
package_upgrade: true

packages:
  - docker.io
  - rsync

runcmd:
  - systemctl enable --now docker
  - mkdir -p /opt/trading
  - mkdir -p /opt/trading/data
  - chown -R ubuntu:ubuntu /opt/trading
  - usermod -aG docker ubuntu

final_message: "trading EC2 bootstrap completed"

