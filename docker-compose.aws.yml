services:
  trading-bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: trading-bot
    restart: unless-stopped
    command: ["trading-bot", "run-paper-bot", "--config", "bots/cex_swing/config.aws.json"]
    ports:
      - "9464:9464"
    volumes:
      - ./data:/app/data

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: trading-prometheus
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    ports:
      - "9090:9090"
    volumes:
      - ./deploy/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./deploy/prometheus/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
      - ./data/prometheus:/prometheus
    depends_on:
      - trading-bot
      - alertmanager

  alertmanager:
    image: prom/alertmanager:v0.28.1
    container_name: trading-alertmanager
    restart: unless-stopped
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
    ports:
      - "9093:9093"
    volumes:
      - ./deploy/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    depends_on:
      - discord-relay

  discord-relay:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: trading-discord-relay
    restart: unless-stopped
    command: ["python", "-m", "trading_bot.alerting.discord_relay"]
    environment:
      DISCORD_WEBHOOK_URL: ${DISCORD_WEBHOOK_URL:-}
      PORT: "9094"
    ports:
      - "9094:9094"

  grafana:
    image: grafana/grafana:11.1.4
    container_name: trading-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./data/grafana:/var/lib/grafana
    depends_on:
      - prometheus
